name: CI

# Lint and tests run on every PR and push. On pushes we also build the package
# and publish: dev versions go to TestPyPI on every push, and version tags
# (vX.Y.Z) publish to PyPI. Versions are derived from git tags by hatch-vcs —
# nothing is hardcoded, so a release is just `git tag vX.Y.Z && git push --tags`.
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

# Cancel superseded runs on a PR; never cancel main/tag runs mid-publish.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so hatch-vcs can resolve the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: Ruff lint
        run: ruff check .

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev extras
        run: pip install -e .[dev]
      - name: Run tests
        run: pytest

  build:
    name: build distribution
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required: hatch-vcs computes the version from git tags
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    # Every push (main commits and tags); never on PRs.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/issue-creds/
    permissions:
      id-token: write  # OIDC token for Trusted Publishing (no API token needed)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true  # re-running at the same dev version is not an error
          verbose: true

  publish-pypi:
    name: publish to PyPI
    needs: build
    # Only on version tags.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/issue-creds/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
